# Spatial VLM 默认配置

model:
  # 视觉编码器
  vit:
    name: "google/siglip-so400m-patch14-384"
    image_size: 384
    patch_size: 14
    visual_dim: 1152

  # LLM
  llm:
    name: "meta-llama/Llama-3.1-8B-Instruct"
    llm_dim: 4096
    num_heads: 32

  # 方案开关
  enable_text_conditioned_vit: true
  enable_spatial_rope: true
  enable_spatial_cross_attention: false     # 被 Latent Reasoning Loop 替代
  enable_latent_reasoning_loop: true       # 隐空间迭代推理（替代方案 C）

  # Text-Conditioned ViT (方案 A)
  text_conditioned_vit:
    mode: "kv_injection"       # "kv_injection" (DFlash 风格) 或 "cross_attention" (传统)
    injection_layers: null     # null 表示所有层注入；可指定如 [9, 18] 只注入特定层
    context_dim: 256           # KV injection 模式：文本 context 压缩维度
    num_heads: 16              # ViT attention head 数量（SigLIP SO400M = 16）
    dropout: 0.1

  # Spatial 2D RoPE (方案 B)
  spatial_rope:
    max_grid_size: 32
    base: 10000.0

  # Spatial-Aware Cross Attention (方案 C，已被 Latent Reasoning Loop 替代)
  spatial_cross_attention:
    spatial_intent_dim: 64
    num_heads: 8
    dropout: 0.1

  # Latent Reasoning Loop（替代方案 C）
  latent_reasoning_loop:
    latent_dim: 512              # 隐空间维度（瓶颈）
    num_latent_tokens: 8         # latent tokens 数量
    num_iterations: 4            # 迭代轮数
    num_heads: 8                 # attention heads
    mlp_ratio: 4.0
    dropout: 0.1
    share_weights: true          # 所有迭代共享同一个 ReasoningBlock

  # 视觉投影器
  projector:
    type: "mlp"
    hidden_dim: 4096

training:
  # 阶段 1：对齐预训练（冻结 ViT 和 LLM，只训练新增模块）
  stage1:
    epochs: 1
    learning_rate: 1.0e-3
    batch_size: 256
    freeze_vit: true
    freeze_llm: true
    warmup_steps: 1000

  # 阶段 2：全量微调
  stage2:
    epochs: 1
    learning_rate: 2.0e-5
    batch_size: 64
    freeze_vit: false
    freeze_llm: false
    warmup_steps: 500

  optimizer:
    name: "adamw"
    weight_decay: 0.05
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    min_lr: 1.0e-6

data:
  # NFS 持久化根路径（Primus）
  nfs_root: "/primus_datasets/external_data/edu/mllm/fwk/vlm"

  # 空间推理数据集
  spatial_datasets:
    - name: "VSI-Bench"
      path: "/primus_datasets/external_data/edu/mllm/fwk/vlm/vsi_bench"
    - name: "SpatialQA"
      path: "/primus_datasets/external_data/edu/mllm/fwk/vlm/spatial_qa"
    - name: "Theory-of-Space"
      path: "/primus_datasets/external_data/edu/mllm/fwk/vlm/theory_of_space"

  # 通用 VQA 数据集（防止灾难性遗忘）
  general_datasets:
    - name: "LLaVA-Instruct-150K"
      path: "/primus_datasets/external_data/edu/mllm/fwk/vlm/llava_instruct"

evaluation:
  benchmarks:
    - "VSI-Bench"
    - "SpatialQA"
    - "Theory-of-Space"
    - "PerceptionTest"
    - "TempCompass"

# Text-Conditioned Latent Prediction 预训练
pretraining:
  # Target Encoder (EMA)
  target_encoder:
    ema_decay: 0.996
    ema_decay_end: 1.0

  # Latent Predictor
  predictor:
    dim: 384
    num_layers: 3
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.1

  # 文本条件化空间掩码
  masking:
    mask_ratio: 0.5
    min_mask_ratio: 0.3
    max_mask_ratio: 0.7
    directional_prob: 0.5      # 方向掩码（文本空间词引导）
    block_prob: 0.25           # Block 掩码（bbox 引导）
    random_prob: 0.25          # 随机掩码（正则化）

  # Loss
  loss:
    type: "smooth_l1"
    feature_norm: true

  # 训练超参数
  training:
    epochs: 5
    learning_rate: 1.0e-3
    batch_size: 256
    warmup_steps: 2000
    weight_decay: 0.05
    grad_clip: 1.0
    use_amp: true

  # 数据
  data:
    format: "refcoco"
    data_root: "/primus_datasets/external_data/edu/mllm/fwk/vlm/refcoco"
    precomputed_text_features: "/primus_datasets/external_data/edu/mllm/fwk/vlm/refcoco/text_features.pt"
    spatial_filter: true
    max_text_length: 64
    num_workers: 8
