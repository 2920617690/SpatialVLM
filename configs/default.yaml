# Spatial VLM 默认配置
# 基于 Qwen3.5-4B（原生多模态）改造

model:
  # 基座模型：Qwen3.5-4B（原生多模态，自带 ViT + LLM + 投影）
  base_model: "Qwen/Qwen3.5-4B"

  # 视觉编码器（Qwen3.5 自带）
  vit:
    visual_dim: 1024             # ViT hidden_size
    out_hidden_size: 2560        # ViT → LLM 投影输出维度
    patch_size: 16
    depth: 24                    # ViT 层数
    num_heads: 16                # ViT attention heads
    spatial_merge_size: 2        # 空间合并（2x2 patches → 1 token）

  # LLM（Qwen3.5 自带）
  llm:
    llm_dim: 2560               # LLM hidden_size
    num_heads: 16               # LLM attention heads
    num_kv_heads: 4             # GQA key-value heads
    head_dim: 256
    num_layers: 32
    # 混合注意力：linear_attention x3 + full_attention，共 8 组
    # mrope: interleaved=true, section=[11,11,10]

  # 方案开关
  enable_text_conditioned_vit: true      # 方案 A：文本引导的视觉编码
  enable_spatial_rope: false             # 方案 B：Qwen3.5 已自带 mrope，不需要额外改
  enable_latent_reasoning_loop: true     # 方案 C：隐空间迭代推理

  # Text-Conditioned ViT (方案 A)
  text_conditioned_vit:
    mode: "kv_injection"       # DFlash 风格 KV injection
    injection_layers: null     # null 表示所有 24 层注入
    context_dim: 256           # 文本 context 压缩维度
    text_dim: 2560             # 文本特征维度（= LLM hidden_size）
    num_heads: 16              # ViT attention heads

  # Latent Reasoning Loop（方案 C）
  latent_reasoning_loop:
    visual_dim: 1024             # ViT 输出维度
    text_dim: 2560               # LLM hidden_size
    latent_dim: 512              # 隐空间维度（瓶颈）
    num_latent_tokens: 8         # latent tokens 数量
    num_iterations: 4            # 迭代轮数
    num_heads: 8                 # attention heads
    mlp_ratio: 4.0
    dropout: 0.1
    output_dim: 2560             # 输出维度（= LLM hidden_size）
    share_weights: true          # 所有迭代共享同一个 ReasoningBlock

training:
  # 阶段 1：对齐预训练（冻结 ViT 和 LLM，只训练新增模块）
  stage1:
    epochs: 1
    learning_rate: 1.0e-3
    batch_size: 256
    freeze_vit: true
    freeze_llm: true
    warmup_steps: 1000

  # 阶段 2：全量微调
  stage2:
    epochs: 1
    learning_rate: 2.0e-5
    batch_size: 64
    freeze_vit: false
    freeze_llm: false
    warmup_steps: 500

  optimizer:
    name: "adamw"
    weight_decay: 0.05
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    min_lr: 1.0e-6

data:
  # NFS 持久化根路径（Primus）
  nfs_root: "/primus_datasets/external_data/edu/mllm/fwk/vlm"

  # 空间推理数据集
  spatial_datasets:
    - name: "VSI-Bench"
      path: "/primus_datasets/external_data/edu/mllm/fwk/vlm/vsi_bench"
    - name: "SpatialQA"
      path: "/primus_datasets/external_data/edu/mllm/fwk/vlm/spatial_qa"
    - name: "Theory-of-Space"
      path: "/primus_datasets/external_data/edu/mllm/fwk/vlm/theory_of_space"

  # 通用 VQA 数据集（防止灾难性遗忘）
  general_datasets:
    - name: "LLaVA-Instruct-150K"
      path: "/primus_datasets/external_data/edu/mllm/fwk/vlm/llava_instruct"

evaluation:
  benchmarks:
    - "VSI-Bench"
    - "SpatialQA"
    - "Theory-of-Space"
    - "PerceptionTest"
    - "TempCompass"

# Text-Conditioned Latent Prediction 预训练
pretraining:
  # Target Encoder (EMA)
  target_encoder:
    ema_decay: 0.996
    ema_decay_end: 1.0

  # Latent Predictor
  predictor:
    dim: 384
    num_layers: 3
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.1

  # 文本条件化空间掩码
  masking:
    mask_ratio: 0.5
    min_mask_ratio: 0.3
    max_mask_ratio: 0.7
    directional_prob: 0.5      # 方向掩码（文本空间词引导）
    block_prob: 0.25           # Block 掩码（bbox 引导）
    random_prob: 0.25          # 随机掩码（正则化）

  # Loss
  loss:
    type: "smooth_l1"
    feature_norm: true

  # 训练超参数
  training:
    epochs: 5
    learning_rate: 1.0e-3
    batch_size: 256
    warmup_steps: 2000
    weight_decay: 0.05
    grad_clip: 1.0
    use_amp: true

  # 数据
  data:
    format: "refcoco"
    data_root: "/primus_datasets/external_data/edu/mllm/fwk/vlm/refcoco"
    precomputed_text_features: "/primus_datasets/external_data/edu/mllm/fwk/vlm/refcoco/text_features.pt"
    spatial_filter: true
    max_text_length: 64
    num_workers: 8
