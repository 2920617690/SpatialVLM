project:
  name: "qwen35_qcr"
  seed: 42
  output_root: "./outputs/qwen35_qcr"

model:
  base_model_id: "Qwen/Qwen3.5-4B"
  trust_remote_code: true
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"
  gradient_checkpointing: true
  use_flash_attention_2: false
  max_image_resolution: 448
  max_prompt_length: 4096
  max_generation_tokens: 256
  llm_hidden_size: 2560
  reencode_backend: "strict_shared_vit"
  condition_token_type: "register"
  residual_gate: "channel"
  reencode_slot_token: "<reencode_slot>"

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  root: "./data/synthetic/qwen35_qcr"
  train_manifest: "./data/synthetic/qwen35_qcr/manifests/train.jsonl"
  val_manifest: "./data/synthetic/qwen35_qcr/manifests/val.jsonl"
  test_manifest: "./data/synthetic/qwen35_qcr/manifests/test.jsonl"
  image_root: "./data/synthetic/qwen35_qcr/images"
  max_train_samples: null
  max_eval_samples: null
  num_workers: 2

training:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  num_train_epochs: 1
  warmup_ratio: 0.03
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  bf16: true
  fp16: false
  dataloader_num_workers: 2
  report_to: []
  remove_unused_columns: false

loss:
  lambda_draft: 0.3
  lambda_final: 1.0
  use_draft_loss: true
