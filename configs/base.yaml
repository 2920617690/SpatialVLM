project:
  name: "avv"
  seed: 42
  output_dir: "./outputs"

data:
  train_manifest: "./data/train_relations.jsonl"
  val_manifest: "./data/val_relations.jsonl"
  image_root: "./data/images"
  num_workers: 4
  answer_labels: ["yes", "no"]
  verifier_labels: ["support", "contradict", "insufficient"]
  relation_labels:
    - "left_of"
    - "right_of"
    - "above"
    - "below"
    - "overlap"
    - "inside"
    - "intersect"
    - "larger_than"
    - "smaller_than"

model:
  image_channels: 3
  image_size: 224
  hidden_dim: 256
  question_dim: 256
  vocab_size: 4096
  patch_dim: 256
  num_patches: 196
  crop_size: 160
  answer_classes: 2
  verifier_classes: 3

training:
  epochs: 5
  batch_size: 16
  learning_rate: 3.0e-4
  weight_decay: 0.01
  log_every: 20
  device: "cpu"

loss:
  lambda_final: 1.0
  lambda_ptr: 1.0
  lambda_ver: 1.0
  lambda_cf: 0.5
  lambda_cons: 0.1
