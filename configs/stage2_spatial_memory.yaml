# Stage 2 Configuration: Spatial Memory
# Freeze ViT, train Memory + PE

model:
  # 3D-aware ViT config (frozen)
  three_d_aware_vit:
    embed_dim: 768
    depth: 12
    num_heads: 12
    patch_size: 16
    image_size: 224
    num_frames: 4
    checkpoint: "checkpoints/stage1/best_model.pt"
    
  # Dual Coordinate PE config (trainable)
  dual_coordinate_pe:
    embed_dim: 768
    max_seq_length: 1000
    coordinate_dim: 12
    
  # Spatial Belief Memory config (trainable)
  spatial_belief_memory:
    memory_dim: 768
    max_memory_size: 1000
    attention_heads: 8
    num_layers: 4
    dropout: 0.1
    
  # Projector config (frozen)
  projector:
    visual_token_dim: 768
    llm_embed_dim: 4096
    projection_type: "mlp"
    hidden_dim: 4096
    num_layers: 2
    dropout: 0.1
    
  # LLM config (frozen)
  llm_decoder:
    model_name: "meta-llama/Llama-2-7b-hf"
    freeze: true

data:
  dataset:
    name: "SpatialExplorationDataset"
    data_path: "data/spatial_exploration"
    max_trajectory_length: 50
    image_size: [224, 224]
    
  dataloader:
    batch_size: 4
    num_workers: 4
    pin_memory: true
    shuffle: true

training:
  stage: 2
  learning_rate: 5e-5
  weight_decay: 0.01
  num_epochs: 15
  warmup_steps: 500
  max_grad_norm: 1.0
  scheduler: "cosine"
  
  # Loss weights
  memory_reconstruction_weight: 1.0
  belief_revision_weight: 1.0
  uncertainty_calibration_weight: 0.5
  
  # Logging
  log_interval: 10
  save_interval: 1000
  eval_interval: 500
  
  # Wandb
  use_wandb: true
  wandb_project: "spatial_vlm"
  wandb_run_name: "stage2_spatial_memory"

# Accelerate/DeepSpeed config
accelerate:
  gradient_accumulation_steps: 2
  mixed_precision: "fp16"
  ddp_find_unused_parameters: false

# Output
output_dir: "outputs/stage2"
checkpoint_dir: "checkpoints/stage2"
