<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Spatial VLM — Transformer Architecture Diagram</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fdfdfd; font-family: 'Helvetica Neue', Arial, 'PingFang SC', sans-serif; padding:50px 30px; color:#222; }

/* ===== SVG canvas ===== */
svg { display:block; margin:0 auto; }
svg text { font-family: 'Helvetica Neue', Arial, 'PingFang SC', sans-serif; }

/* ===== Title ===== */
.diagram-title { text-anchor:middle; font-size:20px; font-weight:700; fill:#111; }
.diagram-sub { text-anchor:middle; font-size:11px; fill:#888; }

/* ===== Module blocks ===== */
.mod { rx:6; ry:6; stroke-width:1.5; }
.mod-label { font-size:11px; font-weight:700; text-anchor:middle; }
.mod-sub { font-size:9px; fill:#777; text-anchor:middle; }
.dim-label { font-size:8.5px; fill:#999; font-family:'SF Mono','Fira Code',monospace; text-anchor:middle; }

/* colors */
.fill-purple  { fill:#ede9fe; stroke:#7c3aed; }  /* ViT / visual */
.fill-orange  { fill:#fff7ed; stroke:#ea580c; }  /* Scheme A / KV inject */
.fill-green   { fill:#ecfdf5; stroke:#059669; }  /* Text encoder */
.fill-blue    { fill:#eff6ff; stroke:#2563eb; }  /* Scheme C / cross-attn */
.fill-red     { fill:#fef2f2; stroke:#dc2626; }  /* LLM / Scheme B */
.fill-gray    { fill:#f8fafc; stroke:#94a3b8; }  /* Projector / misc */
.fill-yellow  { fill:#fefce8; stroke:#ca8a04; }  /* gate */
.fill-white   { fill:#fff;    stroke:#cbd5e1; }

.text-purple { fill:#6d28d9; }
.text-orange { fill:#c2410c; }
.text-green  { fill:#047857; }
.text-blue   { fill:#1d4ed8; }
.text-red    { fill:#b91c1c; }
.text-gray   { fill:#64748b; }
.text-yellow { fill:#a16207; }

/* arrows */
.arrow-line { stroke:#94a3b8; stroke-width:1.2; fill:none; }
.arrow-head-marker { fill:#94a3b8; }
.arrow-thick { stroke:#ea580c; stroke-width:1.8; fill:none; stroke-dasharray:4,3; }
.arrow-inject { stroke:#ea580c; stroke-width:1.5; fill:none; }

/* dashed box */
.dashed-box { fill:none; stroke:#cbd5e1; stroke-width:1; stroke-dasharray:6,4; rx:10; ry:10; }

/* braces / annotations */
.ann { font-size:9px; fill:#999; }
.ann-bold { font-size:9.5px; fill:#555; font-weight:600; }

/* ×N label */
.times-n { font-size:13px; font-weight:800; fill:#7c3aed; text-anchor:middle; }

/* Add/concat symbols */
.op-circle { fill:#fff; stroke:#94a3b8; stroke-width:1.2; }
.op-text { font-size:13px; font-weight:700; text-anchor:middle; dominant-baseline:central; fill:#64748b; }

/* legend */
.legend-rect { rx:3; ry:3; stroke-width:1; }
.legend-text { font-size:9.5px; fill:#555; }
</style>
</head>
<body>

<svg viewBox="0 0 920 1340" width="920" height="1340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" class="arrow-head-marker"/>
  </marker>
  <marker id="ah-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
  </marker>
</defs>

<!-- ===== Title ===== -->
<text x="460" y="36" class="diagram-title">Spatial VLM — Text-Conditioned ViT with KV Injection</text>
<text x="460" y="54" class="diagram-sub">DFlash-inspired architecture: persistent text conditioning via KV concatenation at every ViT layer</text>

<!-- ================================================================== -->
<!--  LEFT SIDE: Text Encoder Branch                                     -->
<!-- ================================================================== -->

<!-- Text Input -->
<rect x="60" y="90" width="160" height="40" class="mod fill-gray"/>
<text x="140" y="112" class="mod-label text-gray">Text Query</text>
<text x="140" y="142" class="dim-label">(B, T)</text>

<!-- arrow down -->
<line x1="140" y1="130" x2="140" y2="160" class="arrow-line" marker-end="url(#ah)"/>

<!-- Text Encoder -->
<rect x="50" y="160" width="180" height="56" class="mod fill-green"/>
<text x="140" y="183" class="mod-label text-green">Text Encoder</text>
<text x="140" y="197" class="mod-sub">(LLaMA 3.1 8B, frozen)</text>
<text x="140" y="228" class="dim-label">(B, T, 4096)</text>

<!-- arrow down to TextContextEncoder -->
<line x1="140" y1="216" x2="140" y2="252" class="arrow-line" marker-end="url(#ah)"/>

<!-- TextContextEncoder -->
<rect x="40" y="252" width="200" height="68" class="mod fill-orange"/>
<text x="140" y="271" class="mod-label text-orange">TextContextEncoder</text>
<text x="140" y="286" class="mod-sub">Linear(4096→512)</text>
<text x="140" y="298" class="mod-sub">GELU → Linear(512→256)</text>
<text x="140" y="310" class="mod-sub">LayerNorm</text>
<text x="140" y="332" class="dim-label">(B, T, 256) — compact context</text>

<!-- arrow down: context goes right and feeds into every ViT layer -->
<!-- We draw a long vertical line down, then horizontal dashes into the ViT block -->
<line x1="140" y1="320" x2="140" y2="820" class="arrow-thick" marker-end="url(#ah-orange)"/>

<!-- annotation on the context line -->
<text x="90" y="580" class="ann-bold" transform="rotate(-90,90,580)" style="text-anchor:middle;">Shared Text Context (256d) → inject into every layer's KV</text>


<!-- ================================================================== -->
<!--  RIGHT SIDE: ViT with KV Injection (the main Transformer block)    -->
<!-- ================================================================== -->

<!-- Image Input -->
<rect x="540" y="90" width="160" height="40" class="mod fill-gray"/>
<text x="620" y="112" class="mod-label text-gray">Input Image</text>
<text x="620" y="142" class="dim-label">(B, 3, 384, 384)</text>

<!-- arrow down -->
<line x1="620" y1="130" x2="620" y2="160" class="arrow-line" marker-end="url(#ah)"/>

<!-- Patch Embed -->
<rect x="530" y="160" width="180" height="44" class="mod fill-purple"/>
<text x="620" y="180" class="mod-label text-purple">Patch Embedding</text>
<text x="620" y="194" class="mod-sub">Conv2d(3,1152,14,14)</text>
<text x="620" y="216" class="dim-label">(B, 729, 1152)</text>

<!-- arrow down -->
<line x1="620" y1="204" x2="620" y2="250" class="arrow-line" marker-end="url(#ah)"/>

<!-- ===== Transformer Block (×27) dashed outline ===== -->
<rect x="310" y="250" width="590" height="530" class="dashed-box"/>
<text x="870" y="272" class="times-n">×27</text>
<text x="870" y="288" class="ann" style="text-anchor:end;">layers</text>

<!-- --- Layer Norm 1 --- -->
<rect x="540" y="264" width="160" height="34" class="mod fill-white"/>
<text x="620" y="285" class="mod-label text-gray">LayerNorm₁</text>

<!-- residual split point -->
<!-- save input for residual: draw a curved line on the right -->
<line x1="620" y1="250" x2="820" y2="250" class="arrow-line" style="stroke-dasharray:3,3;"/>
<line x1="820" y1="250" x2="820" y2="470" class="arrow-line" style="stroke-dasharray:3,3;"/>

<!-- arrow down from LN1 -->
<line x1="620" y1="298" x2="620" y2="318" class="arrow-line" marker-end="url(#ah)"/>

<!-- ===== Multi-Head Self-Attention with KV Injection ===== -->
<!-- Outer box -->
<rect x="340" y="318" width="520" height="136" class="mod fill-purple" style="fill:#f5f3ff;"/>
<text x="600" y="338" class="mod-label text-purple">Multi-Head Self-Attention + KV Injection</text>

<!-- Q/K/V from visual -->
<rect x="365" y="352" width="70" height="30" class="mod fill-purple"/>
<text x="400" y="371" class="mod-label" style="font-size:10px;" fill="#6d28d9">Q_vis</text>
<rect x="450" y="352" width="70" height="30" class="mod fill-purple"/>
<text x="485" y="371" class="mod-label" style="font-size:10px;" fill="#6d28d9">K_vis</text>
<rect x="535" y="352" width="70" height="30" class="mod fill-purple"/>
<text x="570" y="371" class="mod-label" style="font-size:10px;" fill="#6d28d9">V_vis</text>

<!-- K_text, V_text from injection -->
<rect x="637" y="352" width="70" height="30" class="mod fill-orange"/>
<text x="672" y="371" class="mod-label" style="font-size:10px;" fill="#c2410c">K_txt</text>
<rect x="722" y="352" width="70" height="30" class="mod fill-orange"/>
<text x="757" y="371" class="mod-label" style="font-size:10px;" fill="#c2410c">V_txt</text>

<!-- Gate symbol between vis and txt -->
<rect x="618" y="356" width="12" height="22" class="mod fill-yellow" style="rx:3;ry:3;"/>
<text x="624" y="371" style="font-size:8px; text-anchor:middle; fill:#a16207; font-weight:700;">G</text>

<!-- KVInjectionHead label -->
<text x="715" y="345" class="ann-bold" style="fill:#c2410c; text-anchor:middle;">KVInjectionHead<tspan style="font-weight:400; fill:#999;"> (per-layer)</tspan></text>

<!-- Arrow from context line into K_txt / V_txt -->
<line x1="140" y1="367" x2="340" y2="367" class="arrow-inject" style="stroke-dasharray:4,3;" marker-end="url(#ah-orange)"/>
<text x="250" y="360" class="ann" style="fill:#c2410c; text-anchor:middle;">context (256d)</text>

<!-- Concatenation symbols -->
<!-- K concat -->
<circle cx="520" cy="408" r="9" class="op-circle" style="stroke:#7c3aed;"/>
<text x="520" y="408" class="op-text" style="fill:#7c3aed; font-size:11px;">||</text>
<text x="520" y="425" class="dim-label" style="fill:#7c3aed;">cat K</text>

<!-- V concat -->
<circle cx="640" cy="408" r="9" class="op-circle" style="stroke:#7c3aed;"/>
<text x="640" y="408" class="op-text" style="fill:#7c3aed; font-size:11px;">||</text>
<text x="640" y="425" class="dim-label" style="fill:#7c3aed;">cat V</text>

<!-- lines from K_vis, K_txt to concat -->
<line x1="485" y1="382" x2="485" y2="400" class="arrow-line"/>
<line x1="485" y1="400" x2="511" y2="400" class="arrow-line"/>
<line x1="672" y1="382" x2="672" y2="392" class="arrow-line"/>
<line x1="672" y1="392" x2="529" y2="392" class="arrow-line"/>
<line x1="529" y1="392" x2="529" y2="400" class="arrow-line"/>

<line x1="570" y1="382" x2="570" y2="400" class="arrow-line"/>
<line x1="570" y1="400" x2="631" y2="400" class="arrow-line"/>
<line x1="757" y1="382" x2="757" y2="392" class="arrow-line"/>
<line x1="757" y1="392" x2="649" y2="392" class="arrow-line"/>
<line x1="649" y1="392" x2="649" y2="400" class="arrow-line"/>

<!-- Scaled Dot-Product Attention -->
<rect x="460" y="436" width="200" height="30" class="mod fill-white" style="stroke:#7c3aed;"/>
<text x="560" y="455" class="mod-label" style="font-size:10px;" fill="#6d28d9">Scaled Dot-Product Attention</text>

<!-- arrows into SDPA -->
<line x1="400" y1="382" x2="400" y2="442" class="arrow-line"/>
<line x1="400" y1="442" x2="460" y2="442" class="arrow-line" marker-end="url(#ah)"/>
<line x1="520" y1="417" x2="520" y2="436" class="arrow-line" marker-end="url(#ah)"/>
<line x1="640" y1="417" x2="640" y2="436" class="arrow-line" marker-end="url(#ah)"/>
<text x="420" y="440" class="dim-label" style="text-anchor:start;">Q</text>
<text x="522" y="434" class="dim-label" style="text-anchor:start;">K[N+T]</text>
<text x="642" y="434" class="dim-label" style="text-anchor:start;">V[N+T]</text>

<!-- arrow out of SDPA -->
<line x1="560" y1="466" x2="560" y2="476" class="arrow-line"/>

<!-- Output Projection -->
<!-- redirect to center -->
<line x1="560" y1="476" x2="620" y2="476" class="arrow-line" marker-end="url(#ah)"/>

<!-- end of attention block  -->

<!-- Add (residual) -->
<circle cx="620" cy="485" r="11" class="op-circle"/>
<text x="620" y="485" class="op-text">+</text>
<!-- residual arrow into add -->
<line x1="820" y1="470" x2="820" y2="485" class="arrow-line"/>
<line x1="820" y1="485" x2="631" y2="485" class="arrow-line" marker-end="url(#ah)"/>
<text x="735" y="480" class="ann">residual</text>

<!-- arrow down from add -->
<line x1="620" y1="496" x2="620" y2="516" class="arrow-line" marker-end="url(#ah)"/>

<!-- --- Layer Norm 2 --- -->
<rect x="540" y="516" width="160" height="34" class="mod fill-white"/>
<text x="620" y="537" class="mod-label text-gray">LayerNorm₂</text>

<!-- residual split for FFN -->
<line x1="620" y1="496" x2="830" y2="496" class="arrow-line" style="stroke-dasharray:3,3;"/>
<line x1="830" y1="496" x2="830" y2="610" class="arrow-line" style="stroke-dasharray:3,3;"/>

<!-- arrow down -->
<line x1="620" y1="550" x2="620" y2="570" class="arrow-line" marker-end="url(#ah)"/>

<!-- --- FFN / MLP --- -->
<rect x="530" y="570" width="180" height="40" class="mod fill-white" style="stroke:#94a3b8;"/>
<text x="620" y="594" class="mod-label text-gray">Feed-Forward (MLP)</text>

<!-- arrow down -->
<line x1="620" y1="610" x2="620" y2="625" class="arrow-line"/>

<!-- Add (residual) -->
<circle cx="620" cy="635" r="11" class="op-circle"/>
<text x="620" y="635" class="op-text">+</text>
<line x1="830" y1="610" x2="830" y2="635" class="arrow-line"/>
<line x1="830" y1="635" x2="631" y2="635" class="arrow-line" marker-end="url(#ah)"/>
<text x="740" y="630" class="ann">residual</text>

<!-- arrow down out of block -->
<line x1="620" y1="646" x2="620" y2="760" class="arrow-line"/>
<text x="620" y="766" class="dim-label">(B, 729, 1152)</text>

<!-- end of ×27 block -->

<!-- ================================================================== -->
<!--  Below the ViT: Visual Projector                                   -->
<!-- ================================================================== -->
<line x1="620" y1="770" x2="620" y2="810" class="arrow-line" marker-end="url(#ah)"/>

<rect x="520" y="810" width="200" height="44" class="mod fill-gray"/>
<text x="620" y="830" class="mod-label text-gray">Visual Projector</text>
<text x="620" y="844" class="mod-sub">MLP: 1152 → 4096</text>
<text x="620" y="866" class="dim-label">(B, 729, 4096)</text>

<!-- ================================================================== -->
<!--  Scheme C: Spatial-Aware Cross Attention                           -->
<!-- ================================================================== -->
<line x1="620" y1="854" x2="620" y2="895" class="arrow-line" marker-end="url(#ah)"/>

<!-- text also flows in from the left -->
<line x1="140" y1="820" x2="140" y2="920" class="arrow-line"/>
<line x1="140" y1="920" x2="370" y2="920" class="arrow-line" marker-end="url(#ah)"/>
<text x="260" y="914" class="ann" style="text-anchor:middle;">text hidden states (4096d)</text>

<rect x="370" y="895" width="380" height="55" class="mod fill-blue"/>
<text x="560" y="916" class="mod-label text-blue">Spatial-Aware Cross Attention</text>
<text x="560" y="932" class="mod-sub">方案 C: attn_score = Q<tspan style="font-size:7px;" dy="-4">text</tspan><tspan dy="4"> @ K</tspan><tspan style="font-size:7px;" dy="-4">vis</tspan><tspan dy="4"><tspan style="font-size:7px;" dy="4">T</tspan></tspan><tspan dy="-4"> / √d + λ·spatial_bias</tspan></text>
<text x="560" y="960" class="dim-label">SpatialIntentExtractor → PositionIntentMatcher</text>

<!-- ================================================================== -->
<!--  Combine visual + text → LLM with 2D RoPE                         -->
<!-- ================================================================== -->
<line x1="560" y1="950" x2="560" y2="990" class="arrow-line" marker-end="url(#ah)"/>

<!-- Concat -->
<circle cx="560" cy="1005" r="13" class="op-circle" style="stroke:#64748b;"/>
<text x="560" y="1005" class="op-text">||</text>
<text x="600" y="1010" class="ann-bold">Concat</text>
<text x="560" y="1030" class="dim-label">[visual_tokens | text_tokens]</text>

<line x1="560" y1="1035" x2="560" y2="1060" class="arrow-line" marker-end="url(#ah)"/>

<!-- ===== LLM Decoder Block with 2D RoPE ===== -->
<rect x="330" y="1060" width="460" height="170" class="dashed-box" style="stroke:#dc2626; stroke-dasharray:6,4;"/>
<text x="760" y="1082" class="times-n" style="fill:#dc2626;">×N</text>
<text x="760" y="1098" class="ann" style="text-anchor:end; fill:#dc2626;">LLM layers</text>

<rect x="420" y="1076" width="280" height="34" class="mod fill-red" style="fill:#fef2f2;"/>
<text x="560" y="1097" class="mod-label text-red">Causal Self-Attention</text>

<!-- 2D RoPE annotation -->
<rect x="350" y="1120" width="170" height="40" class="mod fill-red"/>
<text x="435" y="1137" class="mod-label" style="font-size:9.5px;" fill="#b91c1c">方案 B: Spatial 2D RoPE</text>
<text x="435" y="1151" class="mod-sub" style="fill:#dc2626;">视觉 token → 2D pos</text>

<rect x="540" y="1120" width="140" height="40" class="mod fill-white" style="stroke:#dc2626;"/>
<text x="610" y="1137" class="mod-label" style="font-size:9.5px;" fill="#b91c1c">Standard 1D RoPE</text>
<text x="610" y="1151" class="mod-sub" style="fill:#dc2626;">文本 token → 1D pos</text>

<rect x="420" y="1176" width="280" height="34" class="mod fill-white" style="stroke:#94a3b8;"/>
<text x="560" y="1197" class="mod-label text-gray">Feed-Forward (MLP)</text>

<!-- arrow out -->
<line x1="560" y1="1230" x2="560" y2="1270" class="arrow-line" marker-end="url(#ah)"/>

<!-- Output -->
<rect x="480" y="1270" width="160" height="40" class="mod fill-green"/>
<text x="560" y="1294" class="mod-label text-green">Output Text</text>

<!--  LEGEND                                                            -->
<!-- ================================================================== -->
<rect x="20" y="870" width="8" height="8" class="legend-rect fill-orange"/>
<text x="34" y="878" class="legend-text">方案 A: KV Injection (文本引导 ViT)</text>
<rect x="20" y="888" width="8" height="8" class="legend-rect fill-red"/>

<text x="46" y="952" class="legend-text">Residual connection</text>

</svg>

</body>
</html>
